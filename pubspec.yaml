name: furtail_app
description: A new Flutter project.
publish_to: none
version: 10.0.0+7

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.2.0
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.4.1
  video_player: ^2.9.2
  visibility_detector: ^0.4.0+2
  wakelock_plus: ^1.2.8
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  path: ^1.9.0
  equatable: ^2.0.5
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  image: ^4.2.0
  image_picker: ^1.0.7
  image_cropper: ^11.0.0
  dio: ^5.4.0
  font_awesome_flutter: ^11.0.0
  http_parser: ^4.0.2
  url_launcher: ^6.3.2
  # System-browser OAuth for Central Auth social providers (mirrors the BPA
  # reference app). Never an embedded WebView.
  flutter_web_auth_2: ^4.1.0
  # SHA-256 for the PKCE S256 code challenge (pure Dart).
  crypto: ^3.0.3
  flutter_riverpod: ^2.5.1
  file_picker: ^8.0.3
  share_plus: ^10.0.2
  # Phase 3: location picker (OSM, no Google)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_core: ^3.8.1
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^3.0.1
  timezone: ^0.9.4
  app_links: 6.4.1
  webview_flutter: ^4.10.0
  connectivity_plus: ^6.0.0
  video_compress: ^3.1.4
  flutter_secure_storage: ^9.2.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.5
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.3
  audioplayers: ^5.2.1
  flutter_animate: ^4.2.0
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon_furtail.png
  icon_background_color: "#ffffff"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/app_icon_furtail.png

flutter_native_splash:
  color: '#ffffff'
  image: assets/images/splash_screen.png
  android_12:
    color: '#ffffff'
    image: assets/images/splash_screen.png
